<!DOCTYPE html>
<html lang="zh-Hant" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- SEO & PWA -->
    <title>ICT 歷年MC試題庫</title>
    <meta name="description" content="最強 DSE ICT 歷年MC試題庫。支援即時練習、模擬考試與自訂組卷。">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>">
    
    <!-- Theme & Preload (防止深色模式白屏閃爍 FOUC) -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0b1120" media="(prefers-color-scheme: dark)">
    
    <!-- Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans TC', 'Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { 
                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 900: '#312e81' },
                        dark: { bg: '#0b1120', card: '#151e32', border: '#2a3655' },
                        light: { bg: '#f8fafc', card: '#ffffff' }
                    },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.04)' }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
        .formatted-text { white-space: pre-wrap !important; word-break: break-word; line-height: 1.8; letter-spacing: 0.015em; color: inherit; }
        .formatted-text img { max-width: 100%; border-radius: 12px; margin: 20px 0; border: 1px solid #e2e8f0; transition: transform 0.2s; cursor: zoom-in; background: #fff; }
        .dark .formatted-text img { border-color: #2a3655; filter: brightness(0.95); }
        .glass-nav { background: rgba(248, 250, 252, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(226, 232, 240, 0.6); }
        .dark .glass-nav { background: rgba(11, 17, 32, 0.85); border-bottom: 1px solid rgba(42, 54, 85, 0.5); }
        button:focus-visible, select:focus-visible, input:focus-visible { outline: none; box-shadow: 0 0 0 2px #6366f1, 0 0 0 4px rgba(99, 102, 241, 0.2); }
        .option-btn { transition: transform 0.15s ease-out, background-color 0.2s, border-color 0.2s; }
        .option-btn:active { transform: scale(0.98); }
        .nav-grid-item { transition: all 0.2s; }
        .nav-grid-item:hover { transform: translateY(-2px); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; border: 2px solid transparent; background-clip: content-box; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background-color: #475569; }
        @keyframes subtleFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .question-card { animation: subtleFadeIn 0.3s ease-out forwards; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .select-auto { user-select: auto; -webkit-user-select: auto; }
        .modal-container { display: none; } 
        .modal-container.active { display: flex !important; } 
    </style>
</head>

<body class="bg-light-bg text-slate-800 dark:bg-dark-bg dark:text-slate-200 transition-colors duration-300 min-h-screen flex flex-col pb-24 xl:pb-0 select-none">

    <!-- Header -->
    <nav class="absolute md:fixed top-0 inset-x-0 z-40 glass-nav transition-all duration-300 pt-[env(safe-area-inset-top)] h-[calc(4rem+env(safe-area-inset-top))]">
        <div class="max-w-[1450px] mx-auto px-4 sm:px-6 h-full flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer group" onclick="window.scrollTo({top:0, behavior:'smooth'})">
                <div class="w-9 h-9 bg-brand-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-brand-500/20 group-hover:scale-105 transition-transform">
                    <i class="fas fa-graduation-cap text-sm"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-tight leading-none text-slate-900 dark:text-slate-100">ICT MC試題庫</h1>
                    <p id="greeting-text" class="text-[10px] text-brand-600 dark:text-brand-400 font-bold tracking-wider mt-0.5">早晨，準備好溫習了嗎？</p>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-5">
                <div class="flex flex-col items-end mr-2">
                    <span class="text-[10px] text-slate-400 font-bold tracking-wider">目前得分</span>
                    <div class="flex items-center gap-1.5">
                        <span id="header-score" class="font-mono font-bold text-brand-600 dark:text-brand-500 text-lg leading-none">0</span>
                        <span class="text-xs text-slate-400 font-bold">/ <span id="header-total">0</span></span>
                    </div>
                </div>
                <div class="h-6 w-px bg-slate-200 dark:bg-slate-700"></div>
                <button onclick="toggleDarkMode()" class="w-9 h-9 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800/80 transition-colors focus:ring-2 focus:ring-brand-500" aria-label="切換深色模式">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:inline text-amber-300"></i>
                </button>
            </div>
        </div>
        <div class="absolute bottom-0 left-0 w-full h-[2px] bg-slate-100 dark:bg-dark-border">
            <div id="progress-bar" class="h-full bg-brand-600 dark:bg-brand-500 transition-all duration-500 w-0 shadow-[0_0_10px_rgba(99,102,241,0.5)]"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-[1450px] mx-auto w-full px-4 sm:px-6 pt-[calc(5rem+env(safe-area-inset-top))] md:pt-[calc(7rem+env(safe-area-inset-top))] flex flex-col xl:flex-row gap-8">
        
        <!-- Sidebar -->
        <aside class="hidden xl:flex flex-col w-72 flex-shrink-0">
            <div class="sticky top-[calc(7rem+env(safe-area-inset-top))] space-y-6 max-h-[calc(100vh-9rem)] flex flex-col">
                <div class="bg-light-card dark:bg-dark-card rounded-2xl p-5 shadow-soft border border-slate-200 dark:border-dark-border flex-shrink-0">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-slate-400 tracking-wider">計時器</span>
                        <span id="timer-display" class="font-mono font-bold text-slate-700 dark:text-slate-300 bg-slate-100 dark:bg-dark-bg px-2.5 py-0.5 rounded border border-slate-200 dark:border-slate-700">00:00</span>
                    </div>
                    <div>
                        <div class="text-[10px] text-slate-400 font-bold mb-1">已作答</div>
                        <div class="flex items-baseline gap-1">
                            <span id="sidebar-score" class="text-3xl font-extrabold text-slate-800 dark:text-slate-100 tracking-tight">0</span>
                            <span class="text-slate-400 font-bold text-sm">/ <span id="sidebar-total">0</span></span>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 border-t border-slate-100 dark:border-dark-border flex justify-between items-center">
                        <div class="flex items-center gap-2 text-[10px] text-slate-400">
                            <i class="fas fa-check-circle text-emerald-500"></i>
                            <span>題庫載入成功</span>
                        </div>
                        <button onclick="toggleModal('history-modal', true)" class="text-[10px] font-bold text-brand-600 hover:text-brand-500 transition-colors">
                            <i class="fas fa-history mr-1"></i>歷史紀錄
                        </button>
                    </div>
                </div>
                <div class="bg-light-card dark:bg-dark-card rounded-2xl p-5 shadow-soft border border-slate-200 dark:border-dark-border flex-1 flex flex-col min-h-0">
                    <div class="flex justify-between items-center mb-4 flex-shrink-0">
                        <h3 class="text-xs font-bold text-slate-400 flex items-center gap-2"><i class="fas fa-map"></i> 題目導覽</h3>
                    </div>
                    <div class="overflow-y-auto custom-scroll pr-1 flex-1">
                        <div id="question-nav-grid" class="grid grid-cols-5 gap-2 pb-2"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Center -->
        <div class="flex-1 min-w-0">
            <div class="bg-light-card dark:bg-dark-card rounded-2xl p-2 shadow-soft border border-slate-200 dark:border-dark-border mb-8 relative z-30">
                <div class="p-4 pb-2 grid grid-cols-1 md:grid-cols-12 gap-5">
                    
                    <!-- Year Selection -->
                    <div class="md:col-span-4 flex flex-col gap-1.5">
                        <div class="flex justify-between items-baseline">
                            <label for="examyear" class="text-[11px] font-bold text-slate-500 dark:text-slate-400 tracking-wider ml-1">年份 / 試卷</label>
                            <button onclick="openCustomExamModal()" class="text-[10px] font-bold text-brand-600 hover:text-brand-500 transition-colors flex items-center gap-1">
                                <i class="fas fa-magic"></i> 自訂試卷
                            </button>
                        </div>
                        <div class="relative">
                            <select id="examyear" class="w-full pl-4 pr-10 py-3 rounded-xl border border-slate-200 dark:border-dark-border bg-slate-50 dark:bg-dark-bg/50 text-sm font-bold focus:ring-2 focus:ring-brand-500 outline-none cursor-pointer text-slate-800 dark:text-slate-200 appearance-none shadow-sm" onchange="handleFilterChange()"></select>
                            <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                        </div>
                    </div>

                    <div class="md:col-span-4 flex flex-col gap-1.5">
                        <label for="mode" class="text-[11px] font-bold text-slate-500 dark:text-slate-400 tracking-wider ml-1">練習模式</label>
                        <div class="relative">
                            <select id="mode" class="w-full pl-4 pr-10 py-3 rounded-xl border border-slate-200 dark:border-dark-border bg-slate-50 dark:bg-dark-bg/50 text-sm font-bold focus:ring-2 focus:ring-brand-500 outline-none cursor-pointer text-slate-800 dark:text-slate-200 appearance-none shadow-sm" onchange="handleModeChange()">
                                <option value="practice">⚡ 練習模式 (即時對答案)</option>
                                <option value="exam">📝 考試模式 (模擬 DSE)</option>
                                <option value="study">📖 溫習模式 (直接看答案)</option>
                            </select>
                            <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="md:col-span-4 flex flex-col gap-1.5">
                        <label for="search-input" class="text-[11px] font-bold text-slate-500 dark:text-slate-400 tracking-wider ml-1">搜尋關鍵字</label>
                        <div class="relative">
                            <input type="text" id="search-input" placeholder="輸入關鍵字尋找題目..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 dark:border-dark-border bg-slate-50 dark:bg-dark-bg/50 text-sm font-bold focus:ring-2 focus:ring-brand-500 outline-none text-slate-800 dark:text-slate-200 placeholder-slate-400 shadow-sm" oninput="handleSearch()">
                            <i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        </div>
                    </div>
                </div>
                <div class="flex px-4 pb-2 pt-1 gap-2 overflow-x-auto hide-scrollbar">
                    <button onclick="setTab('all')" id="tab-all" class="flex-1 py-2.5 px-4 rounded-lg text-xs font-bold transition-all text-center whitespace-nowrap focus:ring-2 focus:ring-brand-500 shadow-sm">所有題目</button>
                    <button onclick="setTab('wrong')" id="tab-wrong" class="flex-1 py-2.5 px-4 rounded-lg text-xs font-bold transition-all text-center whitespace-nowrap focus:ring-2 focus:ring-brand-500">❌ 錯題重溫</button>
                    <button onclick="setTab('starred')" id="tab-starred" class="flex-1 py-2.5 px-4 rounded-lg text-xs font-bold transition-all text-center whitespace-nowrap focus:ring-2 focus:ring-brand-500">⭐ 星號收藏</button>
                </div>
            </div>

            <!-- Main Question Area -->
            <div id="result" class="space-y-6 min-h-[50vh] select-auto">
                <!-- Skeleton Loader -->
                <div class="animate-pulse bg-white dark:bg-dark-card p-6 rounded-2xl border border-slate-200 dark:border-dark-border shadow-soft">
                    <div class="flex justify-between mb-6"><div class="h-6 bg-slate-200 dark:bg-slate-700 rounded w-20"></div></div>
                    <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-3/4 mb-3"></div>
                    <div class="space-y-4">
                        <div class="h-14 bg-slate-100 dark:bg-slate-800 rounded-xl w-full"></div>
                        <div class="h-14 bg-slate-100 dark:bg-slate-800 rounded-xl w-full"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Bottom Bar -->
    <nav id="mobile-bottom-bar" class="xl:hidden fixed bottom-0 inset-x-0 bg-light-card/95 dark:bg-dark-card/95 backdrop-blur-lg border-t border-slate-200 dark:border-dark-border z-50 pb-safe shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <div class="flex items-center justify-around h-16 px-2">
            <button onclick="toggleMobileNav()" class="flex flex-col items-center justify-center gap-1 w-16 h-full text-slate-500 dark:text-slate-400 active:scale-95 transition-transform touch-manipulation">
                <i class="fas fa-th-large text-lg mb-0.5"></i>
                <span class="text-[10px] font-bold">導覽</span>
            </button>
            <button onclick="toggleDarkMode()" class="flex flex-col items-center justify-center gap-1 w-16 h-full text-slate-500 dark:text-slate-400 active:scale-95 transition-transform touch-manipulation">
                <i class="fas fa-adjust text-lg mb-0.5"></i>
                <span class="text-[10px] font-bold">主題</span>
            </button>
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center justify-center gap-1 w-16 h-full text-slate-500 dark:text-slate-400 active:scale-95 transition-transform touch-manipulation">
                <i class="fas fa-arrow-up text-lg mb-0.5"></i>
                <span class="text-[10px] font-bold">置頂</span>
            </button>
            <button id="mobile-submit-btn" onclick="submitExam()" class="hidden flex-col items-center justify-center gap-1 w-16 h-full text-brand-600 dark:text-brand-400 active:scale-95 transition-transform touch-manipulation">
                <i class="fas fa-check-circle text-xl mb-0.5"></i>
                <span class="text-[10px] font-bold">交卷</span>
            </button>
        </div>
    </nav>

    <!-- Mobile Drawer -->
    <div id="mobile-nav-drawer" class="fixed inset-0 z-[60] hidden" aria-hidden="true">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="toggleMobileNav()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[80%] max-w-[320px] bg-light-card dark:bg-dark-card shadow-2xl p-6 pt-[calc(1.5rem+env(safe-area-inset-top))] flex flex-col transform transition-transform translate-x-full duration-300 pb-safe border-l border-slate-200 dark:border-dark-border" id="mobile-drawer-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-lg text-slate-900 dark:text-white">題目導覽</h2>
                <div class="flex gap-2">
                    <button onclick="toggleModal('history-modal', true); toggleMobileNav()" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-dark-bg border border-slate-200 dark:border-dark-border flex items-center justify-center text-slate-500 active:scale-90 transition-transform"><i class="fas fa-history"></i></button>
                    <button onclick="toggleMobileNav()" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-dark-bg border border-slate-200 dark:border-dark-border flex items-center justify-center text-slate-500 active:scale-90 transition-transform"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="bg-slate-50 dark:bg-dark-bg rounded-xl p-4 mb-5 border border-slate-200 dark:border-slate-700/50">
                <div class="flex justify-between text-xs mb-2 font-bold text-slate-400"><span>完成進度</span><span id="mobile-drawer-score">0/0</span></div>
                <div class="w-full bg-slate-200 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden"><div id="mobile-drawer-progress" class="h-full bg-brand-500 w-0 transition-all duration-500"></div></div>
            </div>
            <div class="flex-1 overflow-y-auto custom-scroll -mr-2 pr-2">
                <div id="mobile-nav-grid" class="grid grid-cols-5 gap-2.5"></div>
            </div>
            <div class="mt-4 pt-4 border-t border-slate-200 dark:border-slate-800 flex justify-between items-center">
                 <span class="text-xs font-bold text-slate-400">字體大小</span>
                 <div class="flex gap-2">
                     <button onclick="adjustFontSize('decrease')" class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700 font-bold">A-</button>
                     <button onclick="adjustFontSize('increase')" class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700 font-bold">A+</button>
                 </div>
            </div>
        </div>
    </div>

    <!-- ✨ 自訂試卷 Modal -->
    <div id="custom-exam-modal" class="modal-container fixed inset-0 z-[80] items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-light-card dark:bg-dark-card w-full max-w-md rounded-3xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300 border border-slate-200 dark:border-dark-border flex flex-col max-h-[85vh]">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/20">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-xl font-bold text-slate-900 dark:text-white flex items-center gap-2"><i class="fas fa-magic text-brand-600"></i> 自訂模擬試卷</h2>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">從歷年試題中組合出一份全新的試卷</p>
                    </div>
                    <button onclick="toggleModal('custom-exam-modal', false)" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><i class="fas fa-times text-xl"></i></button>
                </div>
            </div>
            
            <div class="p-6 overflow-y-auto custom-scroll flex-1">
                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <label class="text-sm font-bold text-slate-700 dark:text-slate-300">1. 選擇來源年份</label>
                            <button onclick="toggleAllYears()" class="text-[10px] font-bold text-brand-600 hover:underline">全選 / 取消</button>
                        </div>
                        <div id="custom-year-list" class="grid grid-cols-3 gap-2"></div>
                    </div>
                    <div>
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 mb-3 block">2. 題目數量</label>
                        <div class="flex items-center gap-4">
                            <input type="range" id="custom-count-range" min="10" max="60" step="5" value="40" class="flex-1 h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-brand-600" oninput="document.getElementById('custom-count-display').innerText = this.value">
                            <span class="font-mono font-bold text-lg text-brand-600 dark:text-brand-400 w-8 text-center" id="custom-count-display">40</span>
                        </div>
                    </div>
                    <div>
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 mb-3 block">3. 進階設定</label>
                        <div class="space-y-3">
                            <label class="flex items-center justify-between p-3 rounded-xl bg-slate-50 dark:bg-dark-bg border border-slate-200 dark:border-slate-700 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                                <span class="text-xs font-bold text-slate-600 dark:text-slate-300">🔀 打亂題目次序</span>
                                <div class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="custom-shuffle-q" class="sr-only peer" checked>
                                    <div class="w-9 h-5 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-brand-600"></div>
                                </div>
                            </label>
                            <label class="flex items-center justify-between p-3 rounded-xl bg-slate-50 dark:bg-dark-bg border border-slate-200 dark:border-slate-700 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                                <span class="text-xs font-bold text-slate-600 dark:text-slate-300">🔠 打亂選項 (A/B/C/D)</span>
                                <div class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="custom-shuffle-o" class="sr-only peer">
                                    <div class="w-9 h-5 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-brand-600"></div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="p-4 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-dark-card z-10">
                <button onclick="generateCustomExam()" class="w-full bg-brand-600 hover:bg-brand-500 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-brand-500/30 active:scale-95 transition-all">生成試卷並開始</button>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="result-modal" class="modal-container fixed inset-0 z-[70] items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-light-card dark:bg-dark-card w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300 border border-slate-200 dark:border-dark-border" id="result-content">
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 dark:from-slate-900 dark:to-black p-6 text-white text-center relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/5 rounded-full blur-2xl"></div>
                <h2 class="text-xl font-bold mb-1 relative z-10">測驗結束</h2>
                <p class="text-slate-400 text-[11px] font-bold tracking-widest relative z-10">個人成績報告</p>
            </div>
            <div class="p-5">
                <div id="grade-card" class="bg-gradient-to-r p-4 rounded-2xl mb-5 shadow-lg text-center transform transition-all text-white">
                    <div class="flex justify-center items-center gap-1.5 mb-1 opacity-90">
                        <i class="fas fa-award text-xs"></i>
                        <span class="text-[11px] font-bold tracking-wider">預測 DSE 等級 (卷一甲部)</span>
                    </div>
                    <div id="grade-level" class="text-4xl font-black mb-1 drop-shadow-md">Level ?</div>
                    <div id="grade-desc" class="text-xs font-bold opacity-95">正在分析成績...</div>
                </div>
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <div class="bg-slate-50 dark:bg-dark-bg p-3 rounded-xl text-center border border-slate-200 dark:border-slate-700/50">
                        <div class="text-slate-800 dark:text-slate-100 font-black text-lg mb-0.5" id="modal-score">0</div>
                        <div class="text-[10px] text-slate-500 font-bold tracking-wider">答對</div>
                    </div>
                    <div class="bg-red-50 dark:bg-red-500/10 p-3 rounded-xl text-center border border-red-100 dark:border-red-500/20">
                        <div class="text-red-500 font-black text-lg mb-0.5" id="modal-wrong">0</div>
                        <div class="text-[10px] text-red-500 font-bold tracking-wider">答錯</div>
                    </div>
                    <div class="bg-emerald-50 dark:bg-emerald-500/10 p-3 rounded-xl text-center border border-emerald-100 dark:border-emerald-500/20">
                        <div class="text-emerald-500 font-black text-lg mb-0.5" id="modal-accuracy">0%</div>
                        <div class="text-[10px] text-emerald-500 font-bold tracking-wider">準確率</div>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="toggleModal('result-modal', false)" class="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 py-3.5 rounded-xl font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors active:scale-95">檢閱試卷</button>
                    <button onclick="retryExam()" class="flex-1 bg-brand-600 text-white py-3.5 rounded-xl font-bold text-sm hover:bg-brand-500 transition-colors shadow-lg shadow-brand-500/30 active:scale-95">重新測驗</button>
                </div>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal-container fixed inset-0 z-[75] items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 opacity-0 transition-opacity duration-300" onclick="toggleModal('history-modal', false)">
        <div class="bg-light-card dark:bg-dark-card w-full max-w-sm max-h-[70vh] flex flex-col rounded-3xl shadow-2xl transform scale-95 transition-transform duration-300 border border-slate-200 dark:border-dark-border" onclick="event.stopPropagation()">
            <div class="p-5 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                <h3 class="font-bold text-slate-900 dark:text-white">歷史成績紀錄</h3>
                <button onclick="toggleModal('history-modal', false)" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><i class="fas fa-times"></i></button>
            </div>
            <div class="overflow-y-auto p-4 custom-scroll flex-1" id="history-list"></div>
            <div class="p-4 border-t border-slate-100 dark:border-slate-800 grid grid-cols-2 gap-3 bg-slate-50 dark:bg-slate-800/30">
                <button onclick="exportData()" class="py-2.5 rounded-lg bg-white dark:bg-dark-bg border border-slate-200 dark:border-slate-700 text-xs font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
                    <i class="fas fa-download mr-1.5 text-brand-600"></i> 備份進度
                </button>
                <button onclick="document.getElementById('import-file').click()" class="py-2.5 rounded-lg bg-white dark:bg-dark-bg border border-slate-200 dark:border-slate-700 text-xs font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
                    <i class="fas fa-upload mr-1.5 text-emerald-600"></i> 還原紀錄
                </button>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(this)">
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 z-[100] bg-black/95 hidden items-center justify-center p-4 transition-opacity duration-300 opacity-0" onclick="closeLightbox()">
        <img id="lightbox-img" src="" class="max-w-full max-h-full object-contain rounded-sm shadow-2xl transform transition-transform duration-300 scale-95">
        <button class="absolute top-4 right-4 text-white/70 hover:text-white text-4xl font-bold z-[101]">&times;</button>
        <p class="absolute bottom-8 text-white/50 text-xs font-mono tracking-widest pointer-events-none">點擊任意處關閉</p>
    </div>

    <!-- Desktop FAB -->
    <button id="desktop-submit-btn" onclick="submitExam()" class="hidden xl:hidden fixed bottom-8 right-8 z-30 bg-brand-600 hover:bg-brand-500 text-white w-14 h-14 rounded-2xl shadow-xl shadow-brand-500/40 items-center justify-center transition-all hover:scale-105 active:scale-95 group focus:ring-4 focus:ring-brand-300" title="交卷">
        <i class="fas fa-check text-xl"></i>
    </button>

    <script>
        let ALL_QUESTIONS = [], displayQuestions = [];
        let state = { 
            score: 0, answeredCount: 0, examSubmitted: false, 
            userAnswers: {}, timer: null, seconds: 0, 
            currentTab: 'all', starredIds: new Set(),
            customQuestionSet: [], isCustomMode: false 
        };

        if ('serviceWorker' in navigator) { 
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(err => console.log('SW fail', err))); 
        }
        
        const vibrate = (pattern) => { if ('vibrate' in navigator) navigator.vibrate(pattern); };

        function updateGreeting() {
            const hour = new Date().getHours();
            let text = "準備好溫習了嗎？";
            if (hour >= 5 && hour < 12) text = "早晨！新的一天，加油溫習！💪";
            else if (hour >= 12 && hour < 18) text = "午安！吃飽後繼續作戰！📖";
            else if (hour >= 18 && hour < 23) text = "晚安！把握晚上的黃金溫習時間！⭐";
            else text = "夜深了，溫習完記得早點休息！🌙";
            document.getElementById('greeting-text').innerText = text;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            updateMetaThemeColor(); 
            updateGreeting(); 
            loadSavedData();
            await fetchXMLData(); 
            checkUnfinishedSession();
            startTimer(); 
            renderQuestions();
            
            document.getElementById('result').addEventListener('click', function(e) { 
                if (e.target.tagName === 'IMG') openLightbox(e.target.src); 
            });
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (!localStorage.getItem('theme')) { 
                    document.documentElement.classList.toggle('dark', e.matches); 
                    updateMetaThemeColor(); 
                }
            });
        });

        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            if (show) {
                if(id === 'history-modal') viewHistory();
                modal.classList.add('active');
                requestAnimationFrame(() => { 
                    modal.classList.remove('opacity-0'); 
                    if(modal.firstElementChild) { 
                        modal.firstElementChild.classList.remove('scale-95'); 
                        modal.firstElementChild.classList.add('scale-100'); 
                    } 
                });
                document.body.style.overflow = 'hidden';
            } else {
                modal.classList.add('opacity-0');
                if(modal.firstElementChild) { 
                    modal.firstElementChild.classList.remove('scale-100'); 
                    modal.firstElementChild.classList.add('scale-95'); 
                }
                setTimeout(() => { 
                    modal.classList.remove('active'); 
                    document.body.style.overflow = ''; 
                }, 300);
            }
        }

        let currentZoom = 100;
        function adjustFontSize(action) {
            if (action === 'increase') currentZoom += 10; 
            else if (action === 'decrease') currentZoom -= 10;
            if (currentZoom < 80) currentZoom = 80; 
            if (currentZoom > 130) currentZoom = 130;
            document.documentElement.style.fontSize = `${currentZoom}%`;
        }
        
        function toggleDarkMode() { 
            document.documentElement.classList.toggle('dark'); 
            try { localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); } catch(e){} 
            updateMetaThemeColor(); 
        }
        
        function updateMetaThemeColor() {
            const color = document.documentElement.classList.contains('dark') ? '#0b1120' : '#f8fafc';
            document.querySelectorAll('meta[name="theme-color"]').forEach(m => m.remove());
            const meta = document.createElement('meta'); meta.name = "theme-color"; meta.content = color; 
            document.head.appendChild(meta);
        }

        function loadSavedData() {
            try {
                if(localStorage.getItem("ict_year") && localStorage.getItem("ict_year") !== 'custom') {
                    document.getElementById("examyear").value = localStorage.getItem("ict_year");
                }
                if(localStorage.getItem("ict_mode")) {
                    document.getElementById("mode").value = localStorage.getItem("ict_mode");
                }
                const savedStars = localStorage.getItem("ict_starred");
                if (savedStars) state.starredIds = new Set(JSON.parse(savedStars));
            } catch(e) {}
        }

        function checkUnfinishedSession() {
            const savedSession = localStorage.getItem('ict_exam_session');
            if (savedSession) {
                try {
                    const session = JSON.parse(savedSession);
                    if (Date.now() - session.timestamp < 86400000) {
                        if (confirm("檢測到您有未完成的考試進度，是否繼續？")) {
                            state.userAnswers = session.answers; 
                            state.seconds = session.time; 
                            state.answeredCount = Object.keys(session.answers).length;
                            document.getElementById("mode").value = 'exam';
                            
                            if (session.isCustomMode && session.customQuestionSet) {
                                state.isCustomMode = true; 
                                state.customQuestionSet = session.customQuestionSet;
                                const yearSelect = document.getElementById('examyear');
                                if (!yearSelect.querySelector('option[value="custom"]')) yearSelect.add(new Option("✨ 自訂模擬試卷", "custom"), 0);
                                yearSelect.value = "custom";
                            } else { 
                                document.getElementById("examyear").value = session.year || document.getElementById("examyear").value; 
                            }
                        } else { 
                            localStorage.removeItem('ict_exam_session'); 
                        }
                    } else { 
                        localStorage.removeItem('ict_exam_session'); 
                    }
                } catch (e) { localStorage.removeItem('ict_exam_session'); }
            }
        }

        async function fetchXMLData() {
            try {
                // 移除 Cache-Buster (?t=...) 交由 sw.js 處理緩存策略
                const response = await fetch('ict-mc.xml');
                if (!response.ok) throw new Error("File not found");
                const str = await response.text(); 
                const xml = new window.DOMParser().parseFromString(str, "text/xml");
                const questions = xml.getElementsByTagName("Question");
                
                const uniqueYears = new Set();
                const yearCounts = {}; 

                ALL_QUESTIONS = Array.from(questions).map((q, index) => {
                    const qTextNode = q.getElementsByTagName("QText")[0]; 
                    const year = qTextNode.getAttribute("examyear") || "綜合題庫"; 
                    uniqueYears.add(year);
                    
                    if (yearCounts[year] === undefined) yearCounts[year] = 0;
                    const paperIndex = yearCounts[year];
                    yearCounts[year]++;

                    let qText = qTextNode.textContent.replace(/\t/g, ""); 
                    const qFigure = qTextNode.getAttribute("figure");
                    // 加入 onerror 避免破圖
                    if (qFigure) qText = qText.replace('#figure', `<img src="./images/${qFigure}" alt="圖片" loading="lazy" onerror="this.style.display='none'">`);
                    
                    const options = Array.from(q.getElementsByTagName("Option")).map((opt, i) => {
                        let text = opt.textContent; 
                        const optFigure = opt.getAttribute("figure");
                        if (optFigure) text = text.replace('#figure', `<img src="./images/${optFigure}" alt="選項圖片" loading="lazy" onerror="this.style.display='none'">`);
                        return { id: `q${index}_opt${i}`, text: text, isCorrect: opt.getAttribute("correct") === "1" };
                    });
                    
                    const explanation = q.getElementsByTagName("explanation")[0]?.textContent || "此題暫無詳細解釋。";
                    const searchText = (qTextNode.textContent + options.map(o => o.text).join(" ")).toLowerCase();
                    
                    return { uid: `${year}_${index}`, id: index, paperIndex, year, qText, options, explanation, searchText };
                });

                const yearSelect = document.getElementById('examyear'); 
                yearSelect.innerHTML = "";
                Array.from(uniqueYears).sort().reverse().forEach(year => yearSelect.add(new Option(year, year)));
                
                const savedYear = localStorage.getItem("ict_year"); 
                if (savedYear && uniqueYears.has(savedYear)) yearSelect.value = savedYear;
                
            } catch (err) { 
                document.getElementById("result").innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-center px-4"><div class="w-16 h-16 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mb-4"><i class="fas fa-exclamation-triangle text-red-500 text-2xl"></i></div><h3 class="text-lg font-bold text-slate-800 dark:text-slate-200 mb-2">題庫載入失敗</h3><p class="text-sm text-slate-500 dark:text-slate-400">請確認 <code>ict-mc.xml</code> 檔案已正確上傳，並檢查網路連線。</p></div>`; 
            }
        }

        function openCustomExamModal() {
            const list = document.getElementById('custom-year-list'); 
            list.innerHTML = "";
            const years = Array.from(new Set(ALL_QUESTIONS.map(q => q.year))).sort().reverse();
            years.forEach(year => {
                const div = document.createElement('div');
                div.innerHTML = `<label class="cursor-pointer flex items-center gap-2 p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"><input type="checkbox" name="custom-year" value="${year}" class="w-4 h-4 rounded text-brand-600 focus:ring-brand-500 custom-year-checkbox" checked><span class="text-xs font-bold text-slate-700 dark:text-slate-300">${year}</span></label>`;
                list.appendChild(div);
            });
            toggleModal('custom-exam-modal', true);
        }

        function toggleAllYears() {
            const checkboxes = document.querySelectorAll('.custom-year-checkbox');
            const allChecked = Array.from(checkboxes).every(c => c.checked);
            checkboxes.forEach(c => c.checked = !allChecked);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) { 
                const j = Math.floor(Math.random() * (i + 1)); 
                [array[i], array[j]] = [array[j], array[i]]; 
            } 
            return array;
        }

        function generateCustomExam() {
            const selectedYears = Array.from(document.querySelectorAll('input[name="custom-year"]:checked')).map(cb => cb.value);
            if (selectedYears.length === 0) { alert("請至少選擇一個年份！"); return; }
            
            const count = parseInt(document.getElementById('custom-count-range').value);
            const shuffleQ = document.getElementById('custom-shuffle-q').checked;
            const shuffleO = document.getElementById('custom-shuffle-o').checked;

            let pool = ALL_QUESTIONS.filter(q => selectedYears.includes(q.year)); 
            pool = shuffleArray([...pool]); 
            let selectedQuestions = pool.slice(0, count);

            if (!shuffleQ) { 
                selectedQuestions.sort((a, b) => { 
                    if (a.year !== b.year) return b.year.localeCompare(a.year); 
                    return a.id - b.id; 
                }); 
            }

            state.customQuestionSet = selectedQuestions.map((q, idx) => {
                const qCopy = { ...q, options: [...q.options], customIndex: idx };
                qCopy.options = qCopy.options.map((opt, oIdx) => ({...opt, originalIndex: oIdx}));
                if (shuffleO) qCopy.options = shuffleArray(qCopy.options); 
                return qCopy;
            });

            state.isCustomMode = true;
            const yearSelect = document.getElementById('examyear');
            if (!yearSelect.querySelector('option[value="custom"]')) yearSelect.add(new Option("✨ 自訂模擬試卷", "custom"), 0);
            yearSelect.value = "custom"; 
            document.getElementById('mode').value = 'exam'; 
            
            toggleModal('custom-exam-modal', false); 
            resetState(); 
            renderQuestions();
        }

        function handleFilterChange() { 
            const val = document.getElementById("examyear").value;
            if (val !== 'custom') state.isCustomMode = false;
            localStorage.setItem("ict_year", val); 
            resetState(); 
            renderQuestions(); 
        }
        
        function handleModeChange() { 
            localStorage.setItem("ict_mode", document.getElementById("mode").value); 
            resetState(); 
            renderQuestions(); 
        }
        
        function handleSearch() { 
            renderQuestions(document.getElementById("search-input").value.toLowerCase()); 
        }

        function resetState() {
            state.score = 0; state.answeredCount = 0; state.examSubmitted = false; 
            state.userAnswers = {}; state.seconds = 0; state.currentTab = 'all';
            localStorage.removeItem('ict_exam_session'); 
            setTabUI('all'); 
            document.getElementById("search-input").value = ""; 
            startTimer(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setTab(tab) { 
            state.currentTab = tab; 
            setTabUI(tab); 
            renderQuestions(); 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        function setTabUI(tab) {
             ['all', 'wrong', 'starred'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = t === tab 
                    ? "flex-1 py-2.5 px-4 rounded-lg text-xs font-bold transition-all text-center whitespace-nowrap bg-slate-800 text-white dark:bg-brand-600 shadow-md"
                    : "flex-1 py-2.5 px-4 rounded-lg text-xs font-bold transition-all text-center whitespace-nowrap bg-transparent text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800/50";
            });
        }

        function toggleStar(e, uid) {
            e.stopPropagation();
            state.starredIds.has(uid) ? state.starredIds.delete(uid) : state.starredIds.add(uid);
            try { localStorage.setItem("ict_starred", JSON.stringify([...state.starredIds])); } catch(e){}
            const icon = document.getElementById(`star_${uid}`);
            if(icon) {
                icon.className = state.starredIds.has(uid) 
                    ? "fas fa-star text-amber-400 text-lg transition-transform hover:scale-110" 
                    : "far fa-star text-slate-300 hover:text-amber-400 text-lg transition-transform hover:scale-110";
            }
            if(state.currentTab === 'starred' && !state.starredIds.has(uid)) renderQuestions();
        }

        function startTimer() {
            if (state.timer) clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.seconds++;
                document.getElementById("timer-display").innerText = `${Math.floor(state.seconds / 60).toString().padStart(2, '0')}:${(state.seconds % 60).toString().padStart(2, '0')}`;
                
                if (document.getElementById("mode").value === 'exam' && !state.examSubmitted && state.seconds % 5 === 0) {
                    const saveData = { answers: state.userAnswers, time: state.seconds, year: document.getElementById('examyear').value, timestamp: Date.now(), isCustomMode: state.isCustomMode };
                    if (state.isCustomMode) saveData.customQuestionSet = state.customQuestionSet;
                    localStorage.setItem('ict_exam_session', JSON.stringify(saveData));
                }
            }, 1000);
        }

        function isQuestionWrong(q) {
            const ans = state.userAnswers[q.uid];
            const mode = document.getElementById("mode").value;
            const isSubmittedExam = (mode === "exam" && state.examSubmitted);
            
            if (ans === undefined) return isSubmittedExam; 
            return (typeof ans === 'object') ? !ans.isCorrect : !q.options[ans].isCorrect;
        }

        function renderQuestions(searchKeyword = "") {
            const year = document.getElementById("examyear").value;
            if(!year) return;

            let questions = (state.isCustomMode && year === 'custom') ? state.customQuestionSet : ALL_QUESTIONS.filter(q => q.year === year);

            if (searchKeyword) questions = questions.filter(q => q.searchText.includes(searchKeyword));
            if (state.currentTab === 'starred') questions = questions.filter(q => state.starredIds.has(q.uid));
            else if (state.currentTab === 'wrong') {
                const mode = document.getElementById("mode").value;
                const isUnsubmittedExam = (mode === "exam" && !state.examSubmitted);
                if (isUnsubmittedExam) { questions = []; } else { questions = questions.filter(q => isQuestionWrong(q)); }
            }

            displayQuestions = questions;
            updateDashboard(); 
            updateNavigator();

            const mode = document.getElementById("mode").value;
            const container = document.getElementById("result");
            
            const fullPaperCount = (state.isCustomMode && year === 'custom') ? state.customQuestionSet.length : ALL_QUESTIONS.filter(q => q.year === year).length;
            const isExamAndActive = (mode === "exam" && !state.examSubmitted && fullPaperCount > 0);
            
            document.getElementById("desktop-submit-btn").style.display = (isExamAndActive && window.innerWidth >= 1280) ? "flex" : "none";
            const mobileBtn = document.getElementById("mobile-submit-btn");
            isExamAndActive ? mobileBtn.classList.remove("hidden") & mobileBtn.classList.add("flex") : mobileBtn.classList.add("hidden") & mobileBtn.classList.remove("flex");

            container.innerHTML = "";
            if (questions.length === 0) {
                const isExamWrongTab = (state.currentTab === 'wrong' && mode === "exam" && !state.examSubmitted);
                const emptyMsg = isExamWrongTab ? "考試進行中，請在交卷後查看錯題 📝" : "找不到相關題目";
                container.innerHTML = `<div class="flex flex-col items-center justify-center py-24 text-slate-300 dark:text-slate-600"><i class="${isExamWrongTab ? 'fas fa-lock' : 'far fa-folder-open'} text-5xl mb-4 opacity-50"></i><p class="font-bold text-sm tracking-widest mt-2">${emptyMsg}</p></div>`;
                return;
            }

            const fragment = document.createDocumentFragment();

            questions.forEach((q) => {
                const qDiv = document.createElement('div');
                qDiv.className = "question-card bg-light-card dark:bg-dark-card p-5 sm:p-8 rounded-2xl shadow-soft border border-slate-200 dark:border-dark-border scroll-mt-36";
                qDiv.id = `card_${q.uid}`;

                const qNumber = (state.isCustomMode && year === 'custom') ? (q.customIndex + 1) : (q.paperIndex + 1);

                let html = `<div class="flex justify-between items-start mb-5"><span class="bg-slate-100 dark:bg-dark-bg border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 text-[11px] font-extrabold tracking-wider font-mono px-3 py-1 rounded-md">第 ${qNumber} 題 <span class="opacity-50 font-normal ml-1">(${q.year})</span></span><button onclick="toggleStar(event, '${q.uid}')" class="p-2 -mr-2 -mt-2"><i id="star_${q.uid}" class="${state.starredIds.has(q.uid) ? "fas fa-star text-amber-400" : "far fa-star text-slate-300"} text-lg"></i></button></div><div class="text-[16px] sm:text-[17px] text-slate-800 dark:text-slate-200 font-medium mb-6 formatted-text select-auto">${q.qText}</div><div class="space-y-3 mb-5">`;

                q.options.forEach((opt, i) => {
                    html += `<button id="btn_${q.uid}_${i}" onclick="handleClick('${q.uid}', ${i})" class="option-btn w-full text-left p-4 rounded-xl border-2 border-transparent bg-slate-50 dark:bg-dark-bg text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 flex justify-between items-center group"><div class="flex items-start gap-4 w-full"><div class="w-6 h-6 rounded-full bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 flex items-center justify-center text-xs font-bold text-slate-400 shrink-0 mt-0.5">${String.fromCharCode(65 + i)}</div><span class="formatted-text text-[15px] flex-1 pt-0.5 select-auto">${opt.text}</span></div><i id="icon_${q.uid}_${i}" class="text-xl ml-3"></i></button>`;
                });

                html += `</div><div id="exp_${q.uid}" class="hidden animate-subtleFadeIn border-t border-slate-100 dark:border-slate-800 pt-5 mt-5"><div class="flex items-start gap-3 p-4 bg-brand-50 dark:bg-brand-900/10 rounded-xl border border-brand-100 dark:border-brand-900/20"><div class="mt-0.5 w-6 h-6 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center text-brand-600 dark:text-brand-400 text-xs"><i class="fas fa-lightbulb"></i></div><div class="flex-1"><h4 class="text-[10px] font-extrabold text-brand-600 dark:text-brand-400 tracking-wider mb-1.5">詳細解釋</h4><p class="text-slate-700 dark:text-slate-300 text-[13px] sm:text-sm formatted-text select-auto">${q.explanation}</p></div></div></div>`;
                
                qDiv.innerHTML = html;
                fragment.appendChild(qDiv);
            });
            
            container.appendChild(fragment);
            questions.forEach(q => restoreQuestionState(q, mode));
        }

        function handleClick(uid, visualIndex) {
            const mode = document.getElementById("mode").value;
            if (mode === "study" || (mode === "exam" && state.examSubmitted) || (mode === "practice" && state.userAnswers[uid] !== undefined)) return;
            
            const year = document.getElementById("examyear").value;
            const baseSet = (state.isCustomMode && year === 'custom') ? state.customQuestionSet : ALL_QUESTIONS.filter(q => q.year === year);
            const q = baseSet.find(item => item.uid === uid);
            if(!q) return;

            const selectedOption = q.options[visualIndex];
            state.userAnswers[uid] = { visualIndex: visualIndex, isCorrect: selectedOption.isCorrect };
            
            if (mode === "practice") {
                if (selectedOption.isCorrect) state.score++; else vibrate(200);
                revealAnswer(uid, visualIndex, false, q);
            } else {
                markSelected(uid, visualIndex, q);
            }

            updateDashboard(); 
            updateNavigatorItem(uid, visualIndex);
        }

        function markSelected(uid, visualIndex, q) {
            if(!q) return;
            q.options.forEach((_, i) => {
                const btn = document.getElementById(`btn_${uid}_${i}`);
                const isSel = i === visualIndex;
                if(btn) {
                    btn.className = `option-btn w-full text-left p-4 rounded-xl border-2 flex justify-between items-center ${isSel ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/20 text-brand-800 dark:text-brand-200 shadow-sm' : 'border-transparent bg-slate-50 dark:bg-dark-bg text-slate-700 dark:text-slate-300'}`;
                    btn.querySelector("div > div").className = `w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shrink-0 mt-0.5 ${isSel ? 'bg-brand-500 text-white' : 'bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-400'}`;
                }
            });
        }

        function revealAnswer(uid, userVisualIdx, isStudyMode, q) {
            if(!q) return;
            const correctVisualIdx = q.options.findIndex(o => o.isCorrect);

            q.options.forEach((_, i) => {
                const btn = document.getElementById(`btn_${uid}_${i}`);
                const icon = document.getElementById(`icon_${uid}_${i}`);
                if (!btn) return;
                btn.disabled = true;
                
                if (i === correctVisualIdx) {
                    btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 dark:bg-emerald-900/10 text-emerald-800 dark:text-emerald-300 flex justify-between items-center font-bold shadow-sm opacity-100";
                    btn.querySelector("div > div").className = "w-6 h-6 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xs font-bold shrink-0 mt-0.5";
                    icon.className = "fas fa-check-circle text-emerald-500 text-xl";
                } else if (i === userVisualIdx && i !== correctVisualIdx && !isStudyMode) {
                    btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-red-500 bg-red-50 dark:bg-red-900/10 text-red-800 dark:text-red-300 flex justify-between items-center opacity-100";
                    btn.querySelector("div > div").className = "w-6 h-6 rounded-full bg-red-500 text-white flex items-center justify-center text-xs font-bold shrink-0 mt-0.5";
                    icon.className = "fas fa-times-circle text-red-500 text-xl";
                } else {
                    btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-transparent bg-slate-50 dark:bg-dark-bg text-slate-400 dark:text-slate-500 flex justify-between items-center opacity-60"; 
                    btn.querySelector("div > div").className = "w-6 h-6 rounded-full bg-transparent border border-slate-300 dark:border-slate-600 text-slate-300 flex items-center justify-center text-xs font-bold shrink-0 mt-0.5";
                }
            });
            document.getElementById(`exp_${uid}`).classList.remove('hidden');
        }

        function restoreQuestionState(q, mode) {
            let answerData = state.userAnswers[q.uid];
            let visualIndex = -1;
            if (answerData !== undefined) visualIndex = (typeof answerData === 'object') ? answerData.visualIndex : answerData;

            if (mode === "study" || (mode === "exam" && state.examSubmitted)) revealAnswer(q.uid, visualIndex, mode === "study" || visualIndex === -1, q);
            else if (mode === "practice" && answerData !== undefined) revealAnswer(q.uid, visualIndex, false, q);
            else if (mode === "exam" && answerData !== undefined) markSelected(q.uid, visualIndex, q);
        }

        function updateNavigator() {
            const year = document.getElementById("examyear").value;
            const fullPaperQuestions = (state.isCustomMode && year === 'custom') ? state.customQuestionSet : ALL_QUESTIONS.filter(q => q.year === year);
            
            ["question-nav-grid", "mobile-nav-grid"].forEach(containerId => {
                const container = document.getElementById(containerId);
                container.innerHTML = "";
                fullPaperQuestions.forEach((q) => {
                    const btn = document.createElement("button");
                    btn.id = `nav_btn_${q.uid}_${containerId}`; 
                    btn.innerText = (state.isCustomMode && year === 'custom') ? (q.customIndex + 1) : (q.paperIndex + 1);
                    
                    btn.onclick = () => {
                        const card = document.getElementById(`card_${q.uid}`);
                        if(card) {
                            window.scrollTo({top: card.getBoundingClientRect().top + window.pageYOffset - (window.innerWidth >= 1280 ? 180 : 100), behavior: 'smooth'});
                            card.classList.add("ring-2", "ring-brand-500"); 
                            setTimeout(() => card.classList.remove("ring-2", "ring-brand-500"), 1000);
                        } else {
                            document.getElementById("search-input").value = ""; 
                            setTab('all');
                            setTimeout(() => {
                                const newCard = document.getElementById(`card_${q.uid}`);
                                if(newCard) {
                                    window.scrollTo({top: newCard.getBoundingClientRect().top + window.pageYOffset - (window.innerWidth >= 1280 ? 180 : 100), behavior: 'smooth'});
                                    newCard.classList.add("ring-2", "ring-brand-500"); 
                                    setTimeout(() => newCard.classList.remove("ring-2", "ring-brand-500"), 1000);
                                }
                            }, 50);
                        }
                        if(window.innerWidth < 1280) toggleMobileNav(); 
                    };
                    container.appendChild(btn); 
                    updateNavigatorBtnColor(btn, q);
                });
            });
        }

        function updateNavigatorItem(uid, visualIndex) {
            const year = document.getElementById("examyear").value;
            const baseSet = (state.isCustomMode && year === 'custom') ? state.customQuestionSet : ALL_QUESTIONS.filter(q => q.year === year);
            const q = baseSet.find(item => item.uid === uid);
            ["question-nav-grid", "mobile-nav-grid"].forEach(cId => {
                const btn = document.getElementById(`nav_btn_${uid}_${cId}`);
                if(btn && q) updateNavigatorBtnColor(btn, q);
            });
        }

        function updateNavigatorBtnColor(btn, q) {
            const ans = state.userAnswers[q.uid];
            const mode = document.getElementById("mode").value;
            let isAnswered = ans !== undefined;
            let isCorrect = false;
            
            if (isAnswered) isCorrect = (typeof ans === 'object') ? ans.isCorrect : q.options[ans].isCorrect;

            let c = "bg-slate-50 dark:bg-dark-bg text-slate-400 border border-slate-200 dark:border-dark-border hover:bg-slate-100"; 
            if (mode === "study") {
                c = "bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 border border-emerald-200";
            } else if (mode === "practice" && isAnswered) {
                c = isCorrect ? "bg-emerald-500 text-white" : "bg-red-500 text-white";
            } else if (mode === "exam") {
                if (state.examSubmitted) {
                    if (!isAnswered) c = "bg-red-500 text-white";
                    else c = isCorrect ? "bg-emerald-500 text-white" : "bg-red-500 text-white";
                } else {
                    c = isAnswered ? "bg-brand-500 text-white" : c;
                }
            }
            btn.className = `nav-grid-item w-full aspect-square rounded-lg text-[11px] font-bold flex items-center justify-center ${c}`;
        }

        function updateDashboard() {
            const year = document.getElementById("examyear").value;
            if(!year) return;
            const fullPaperQuestions = (state.isCustomMode && year === 'custom') ? state.customQuestionSet : ALL_QUESTIONS.filter(q => q.year === year);
            const total = fullPaperQuestions.length;
            
            const attempted = fullPaperQuestions.filter(q => state.userAnswers[q.uid] !== undefined).length;
            const percent = total === 0 ? 0 : (attempted / total) * 100;
            const isExamActive = document.getElementById("mode").value === "exam" && !state.examSubmitted;
            const displayScoreText = isExamActive ? attempted : state.score;
            
            document.getElementById("progress-bar").style.width = `${percent}%`;
            document.getElementById("header-score").innerText = displayScoreText; 
            document.getElementById("header-total").innerText = total;
            document.getElementById("sidebar-score").innerText = displayScoreText;
            document.getElementById("sidebar-total").innerText = total;
            document.getElementById("mobile-drawer-score").innerText = `${displayScoreText}/${total}`;
            document.getElementById("mobile-drawer-progress").style.width = `${percent}%`;
        }

        function evaluateGrade(accuracy) {
            if (accuracy >= 80) return { level: "Level 5+", class: "from-amber-400 to-amber-600 shadow-amber-500/40", text: "表現卓越！具備奪星實力 🌟" };
            if (accuracy >= 70) return { level: "Level 4", class: "from-emerald-400 to-emerald-600 shadow-emerald-500/40", text: "根基扎實！目標穩中求勝 📈" };
            if (accuracy >= 60) return { level: "Level 3", class: "from-blue-400 to-blue-600 shadow-blue-500/40", text: "表現不俗！針對弱點繼續操練 補底 🛡️" };
            if (accuracy >= 40) return { level: "Level 2", class: "from-orange-400 to-orange-600 shadow-orange-500/40", text: "達到及格線！請多溫習錯題本 📖" };
            return { level: "Level 1 / U", class: "from-slate-400 to-slate-600 shadow-slate-500/40", text: "不要灰心！由看詳細解釋開始重新出發 💪" };
        }

        function submitExam() {
            const year = document.getElementById("examyear").value;
            const fullPaperQuestions = (state.isCustomMode && year === 'custom') ? state.customQuestionSet : ALL_QUESTIONS.filter(q => q.year === year);
            const total = fullPaperQuestions.length;

            if (total === 0) return;
            const answered = fullPaperQuestions.filter(q => state.userAnswers[q.uid] !== undefined).length;
            if (!confirm(`您答了 ${answered} / ${total} 題，確定要交卷並結束測驗嗎？`)) return;

            vibrate([50, 50, 50]);
            clearInterval(state.timer); 
            state.examSubmitted = true; 
            state.score = 0; 
            state.answeredCount = 0; 
            let wrongCount = 0;
            
            fullPaperQuestions.forEach(q => {
                const ans = state.userAnswers[q.uid];
                if (ans !== undefined) {
                    state.answeredCount++;
                    const isCorrect = (typeof ans === 'object') ? ans.isCorrect : q.options[ans].isCorrect;
                    isCorrect ? state.score++ : wrongCount++;
                } else {
                    wrongCount++; 
                }
            });

            renderQuestions(); 

            const accuracy = total > 0 ? Math.round((state.score / total) * 100) : 0;
            
            const historyItem = {
                date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                year: state.isCustomMode ? '自訂試卷' : document.getElementById('examyear').value,
                score: state.score,
                total: total,
                grade: evaluateGrade(accuracy).level
            };
            let history = JSON.parse(localStorage.getItem('ict_exam_history') || '[]');
            history.unshift(historyItem);
            if (history.length > 20) history.pop();
            localStorage.setItem('ict_exam_history', JSON.stringify(history));
            localStorage.removeItem('ict_exam_session');

            document.getElementById("modal-score").innerText = state.score;
            document.getElementById("modal-wrong").innerText = wrongCount;
            document.getElementById("modal-accuracy").innerText = accuracy + "%";

            const grade = evaluateGrade(accuracy);
            const gradeCard = document.getElementById("grade-card");
            gradeCard.className = `p-4 rounded-2xl mb-5 shadow-lg text-center transform transition-all text-white bg-gradient-to-r ${grade.class}`;
            document.getElementById("grade-level").innerText = grade.level;
            document.getElementById("grade-desc").innerText = grade.text;

            toggleModal('result-modal', true);
            if (accuracy >= 60) confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
        }

        function closeModal() {
            toggleModal('result-modal', false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function retryExam() { 
            closeModal(); 
            setTimeout(() => { resetState(); renderQuestions(); }, 300); 
        }

        function toggleMobileNav() {
            const drawer = document.getElementById("mobile-nav-drawer");
            const content = document.getElementById("mobile-drawer-content");
            if (drawer.classList.contains("hidden")) {
                drawer.classList.remove("hidden"); 
                requestAnimationFrame(() => content.classList.remove("translate-x-full")); 
                document.body.style.overflow = 'hidden'; 
            } else {
                content.classList.add("translate-x-full"); 
                setTimeout(() => {
                    drawer.classList.add("hidden");
                    document.body.style.overflow = '';
                }, 300);
            }
        }
        
        function openLightbox(src) {
            const lb = document.getElementById('lightbox'); 
            const img = document.getElementById('lightbox-img');
            img.src = src; 
            lb.classList.remove('hidden'); 
            lb.classList.add('flex');
            requestAnimationFrame(() => { 
                lb.classList.remove('opacity-0'); 
                img.classList.remove('scale-95'); 
                img.classList.add('scale-100'); 
            }); 
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            const lb = document.getElementById('lightbox'); 
            const img = document.getElementById('lightbox-img');
            lb.classList.add('opacity-0'); 
            img.classList.remove('scale-100'); 
            img.classList.add('scale-95'); 
            setTimeout(() => { 
                lb.classList.remove('flex'); 
                lb.classList.add('hidden'); 
                document.body.style.overflow = ''; 
            }, 300);
        }

        function viewHistory() {
            const list = document.getElementById('history-list'); 
            const history = JSON.parse(localStorage.getItem('ict_exam_history') || '[]');
            list.innerHTML = history.length === 0 ? '<p class="text-center text-slate-400 text-xs py-10">暫無考試紀錄</p>' : history.map(h => `
                <div class="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl mb-3 border border-slate-100 dark:border-slate-700">
                    <div class="flex justify-between items-center mb-1"><span class="font-bold text-sm text-slate-800 dark:text-slate-200">${h.year}</span><span class="font-bold text-xs px-2 py-0.5 rounded bg-brand-100 dark:bg-brand-900 text-brand-700 dark:text-brand-300">${h.grade}</span></div>
                    <div class="flex justify-between text-[11px] text-slate-500 dark:text-slate-400"><span>${h.date}</span><span class="font-mono font-bold">${h.score} / ${h.total}</span></div>
                </div>`).join('');
        }
        
        function exportData() {
            const data = { 
                history: localStorage.getItem('ict_exam_history'), 
                starred: localStorage.getItem('ict_starred'), 
                theme: localStorage.getItem('theme') 
            };
            const a = document.createElement('a'); 
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type: "application/json"})); 
            a.download = `ICT_Backup_${new Date().toISOString().slice(0,10)}.json`; 
            document.body.appendChild(a); 
            a.click(); 
            document.body.removeChild(a);
        }
        
        function importData(input) {
            const reader = new FileReader(); 
            reader.onload = e => { 
                try { 
                    const d = JSON.parse(e.target.result); 
                    if(d.history) localStorage.setItem('ict_exam_history', d.history); 
                    if(d.starred) localStorage.setItem('ict_starred', d.starred); 
                    if(d.theme) localStorage.setItem('theme', d.theme); 
                    location.reload(); 
                } catch(err){ alert("檔案格式錯誤"); } 
            }; 
            if(input.files[0]) reader.readAsText(input.files[0]);
        }
    </script>
</body>
